name: Deploy to Production

on:
  push:
    branches:
      - Feature
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: and5reas/salesweakness-api
  FRONTEND_IMAGE: and5reas/salesweakness-web
  BACKEND_CONTAINER: salesweakness-api
  FRONTEND_CONTAINER: salesweakness-web
  BACKEND_PORT: 3031
  FRONTEND_PORT: 3032
  DEPLOY_HOST: 20.39.132.34
  DEPLOY_USER: gp2026

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (Backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (Frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Backend Deployment
        run: |
          mkdir -p /tmp/k8s
          cat > /tmp/k8s/backend-deployment.yaml << 'YAML_EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crm-leads-backend
            labels:
              app: crm-leads-backend
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: crm-leads-backend
            template:
              metadata:
                labels:
                  app: crm-leads-backend
              spec:
                containers:
                - name: backend
                  image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
                  ports:
                  - containerPort: 3000
                  env:
                  - name: NODE_ENV
                    value: "production"
                  - name: PORT
                    value: "3000"
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: crm-leads-backend-service
          spec:
            type: ClusterIP
            selector:
              app: crm-leads-backend
            ports:
            - port: 80
              targetPort: 3000
          YAML_EOF

      - name: Generate Frontend Deployment
        run: |
          cat > /tmp/k8s/frontend-deployment.yaml << 'YAML_EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crm-leads-frontend
            labels:
              app: crm-leads-frontend
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: crm-leads-frontend
            template:
              metadata:
                labels:
                  app: crm-leads-frontend
              spec:
                containers:
                - name: frontend
                  image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
                  ports:
                  - containerPort: 80
                  env:
                  - name: NODE_ENV
                    value: "production"
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "250m"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: crm-leads-frontend-service
          spec:
            type: LoadBalancer
            selector:
              app: crm-leads-frontend
            ports:
            - port: 80
              targetPort: 80
            - port: 443
              targetPort: 80
          YAML_EOF

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Kubernetes
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
          
          set -e
          
          echo "Creating namespaces and applying deployments..."
          
          # Create namespace if it doesn't exist
          kubectl create namespace crm-leads --dry-run=client -o yaml | kubectl apply -f -
          
          # Apply backend deployment
          cat << 'BACKEND_YAML' | kubectl apply -f - -n crm-leads
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crm-leads-backend
            labels:
              app: crm-leads-backend
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: crm-leads-backend
            template:
              metadata:
                labels:
                  app: crm-leads-backend
              spec:
                containers:
                - name: backend
                  image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                  - containerPort: 3000
                  env:
                  - name: NODE_ENV
                    value: "production"
                  - name: PORT
                    value: "3000"
                  resources:
                    requests:
                      memory: "256Mi"
                      cpu: "250m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 3000
                    initialDelaySeconds: 30
                    periodSeconds: 10
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: crm-leads-backend-service
          spec:
            type: ClusterIP
            selector:
              app: crm-leads-backend
            ports:
            - port: 80
              targetPort: 3000
              name: http
          BACKEND_YAML
          
          # Apply frontend deployment
          cat << 'FRONTEND_YAML' | kubectl apply -f - -n crm-leads
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: crm-leads-frontend
            labels:
              app: crm-leads-frontend
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: crm-leads-frontend
            template:
              metadata:
                labels:
                  app: crm-leads-frontend
              spec:
                containers:
                - name: frontend
                  image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                  - containerPort: 80
                  env:
                  - name: NODE_ENV
                    value: "production"
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "250m"
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 80
                    initialDelaySeconds: 20
                    periodSeconds: 10
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: crm-leads-frontend-service
          spec:
            type: LoadBalancer
            selector:
              app: crm-leads-frontend
            ports:
            - port: 80
              targetPort: 80
              name: http
            - port: 443
              targetPort: 80
              name: https
          FRONTEND_YAML
          
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/crm-leads-backend -n crm-leads --timeout=5m
          kubectl rollout status deployment/crm-leads-frontend -n crm-leads --timeout=5m
          
          echo "✓ Deployment completed successfully!"
          kubectl get deployments,services -n crm-leads
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts

      - name: Deployment Status
        if: success()
        run: |
          echo "✓ Deployment completed successfully!"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "✗ Deployment failed. Check the logs above."
          exit 1
