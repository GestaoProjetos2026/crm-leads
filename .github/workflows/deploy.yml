name: Deploy to Production

on:
  push:
    branches:
      - Feature
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: and5reas/salesweakness-api
  FRONTEND_IMAGE: and5reas/salesweakness-web
  BACKEND_CONTAINER: salesweakness-api
  FRONTEND_CONTAINER: salesweakness-web
  BACKEND_PORT: 3031
  FRONTEND_PORT: 3032
  DEPLOY_HOST: 20.39.132.34
  DEPLOY_USER: gp2026

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (Backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (Frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push .env to production
        run: |
          scp -i ~/.ssh/deploy_key \
            -P 22 \
            backend/.env \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/salesweakness/backend/.env

      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
          set -e

          REGISTRY="${{ env.REGISTRY }}"
          BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}"
          FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}"
          BACKEND_CONTAINER="${{ env.BACKEND_CONTAINER }}"
          FRONTEND_CONTAINER="${{ env.FRONTEND_CONTAINER }}"
          BACKEND_PORT="${{ env.BACKEND_PORT }}"
          FRONTEND_PORT="${{ env.FRONTEND_PORT }}"
          ENV_FILE="$HOME/salesweakness/backend/.env"

          BACKEND_IMG="${REGISTRY}/${BACKEND_IMAGE}:latest"
          FRONTEND_IMG="${REGISTRY}/${FRONTEND_IMAGE}:latest"

          echo "Starting deployment..."
          echo "Backend: $BACKEND_IMG"
          echo "Frontend: $FRONTEND_IMG"

          # Login to Docker Hub if credentials provided
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          fi

          # Pull latest images
          echo "Pulling images..."
          docker pull "$BACKEND_IMG"
          docker pull "$FRONTEND_IMG"

          # ===== BACKEND =====
          echo ""
          echo "Deploying Backend..."
          if docker ps -a --format '{{.Names}}' | grep -q "^${BACKEND_CONTAINER}$"; then
            echo "Stopping existing backend container: $BACKEND_CONTAINER"
            docker stop "$BACKEND_CONTAINER" || true
            docker rm "$BACKEND_CONTAINER" || true
            sleep 1
          fi

          echo "Starting backend container..."
          docker run -d \
            --name "$BACKEND_CONTAINER" \
            --restart unless-stopped \
            -p "${BACKEND_PORT}:3031" \
            --env-file "$ENV_FILE" \
            --network salesweakness \
            -e DB_HOST=salesweakness-db \
            -e REDIS_HOST=salesweakness-redis \
            "$BACKEND_IMG"

          sleep 2
          if docker ps --format '{{.Names}}' | grep -q "^${BACKEND_CONTAINER}$"; then
            echo "✓ Backend deployed successfully!"
          else
            echo "✗ Backend failed to start"
            docker logs "$BACKEND_CONTAINER" || true
            exit 1
          fi

          # ===== FRONTEND =====
          echo ""
          echo "Deploying Frontend..."
          if docker ps -a --format '{{.Names}}' | grep -q "^${FRONTEND_CONTAINER}$"; then
            echo "Stopping existing frontend container: $FRONTEND_CONTAINER"
            docker stop "$FRONTEND_CONTAINER" || true
            docker rm "$FRONTEND_CONTAINER" || true
            sleep 1
          fi

          echo "Starting frontend container..."
          docker run -d \
            --name "$FRONTEND_CONTAINER" \
            --restart unless-stopped \
            -p "${FRONTEND_PORT}:3032" \
            --network salesweakness \
            "$FRONTEND_IMG"

          sleep 2
          if docker ps --format '{{.Names}}' | grep -q "^${FRONTEND_CONTAINER}$"; then
            echo "✓ Frontend deployed successfully!"
          else
            echo "✗ Frontend failed to start"
            docker logs "$FRONTEND_CONTAINER" || true
            exit 1
          fi

          # Summary
          echo ""
          echo "========================================="
          echo "✓ Deployment completed successfully!"
          echo "========================================="
          docker ps -a --filter "name=salesweakness-"
          echo ""
          echo "Backend:  http://localhost:${BACKEND_PORT} (API)"
          echo "Frontend: http://localhost:${FRONTEND_PORT} (Web)"

          # Cleanup
          docker logout || true
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts

      - name: Deployment Status
        if: success()
        run: |
          echo "✓ Deployment to ${{ env.DEPLOY_HOST }} completed successfully!"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "✗ Deployment failed. Please check the logs above."
          exit 1
