# Docker Compose para VM de Produção
# Gerencia apenas Postgres e Redis
# A aplicação (backend) é gerenciada pelo pipeline CI/CD

version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: salesweakness-db
    restart: unless-stopped
    networks:
      - salesweakness
    environment:
      POSTGRES_USER: ${DB_USER:-salesweakness}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salesweakness}
      POSTGRES_DB: ${DB_NAME:-salesweakness}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.8
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-salesweakness}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salesweakness-redis
    restart: unless-stopped
    networks:
      - salesweakness
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  salesweakness:
    driver: bridge
    name: salesweakness

volumes:
  postgres_data:
    name: salesweakness-postgres-data
  redis_data:
    name: salesweakness-redis-data
